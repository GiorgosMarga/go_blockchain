<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blockchain Explorer</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #667eea;
      margin-bottom: 8px;
      font-size: 28px;
    }

    h2 {
      color: #333;
      margin-bottom: 16px;
      font-size: 20px;
    }

    .search-bar {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .search-bar:focus {
      outline: none;
      border-color: #667eea;
    }

    .block-item {
      background: #f9fafb;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      border-left: 5px solid #667eea;
    }

    .block-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .tx-item {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .coinbase {
      border-left: 5px solid #10b981;
      background: #f0fdf4;
    }

    .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }

    .value {
      font-family: 'Courier New', monospace;
      word-break: break-all;
    }

    button,
    .btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }

    button:hover {
      background: #5568d3;
    }

    .small {
      font-size: 13px;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>Blockchain Explorer</h1>
      <p class="small">Your local blockchain • {{.BlockCount}} blocks</p>

      <!-- Search -->
      <input type="text" id="search" class="search-bar" placeholder="Search by block hash, height, or transaction ID..."
        hx-get="/search" hx-trigger="keyup changed delay:300ms" hx-target="#results" hx-params="search">

      <!-- Results area -->
      <div id="results">
        {{template "blocks.html" .}}
      </div>
    </div>
  </div>

  <script>
    // Optional: clear search when empty
    document.getElementById('search').addEventListener('input', function() {
      if (this.value === '') {
        this.dispatchEvent(new Event('change'));
      }
    });
  </script>
</body>

</html>
