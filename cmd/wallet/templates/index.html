<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Username}}'s Wallet</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #667eea;
      margin-bottom: 8px;
      font-size: 28px;
    }

    h2 {
      color: #333;
      margin-bottom: 16px;
      font-size: 20px;
    }

    .balance-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .balance {
      font-size: 36px;
      font-weight: bold;
      color: #667eea;
    }

    .balance-label {
      color: #666;
      font-size: 14px;
      margin-bottom: 4px;
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    button:hover {
      background: #5568d3;
    }

    button:active {
      transform: scale(0.98);
    }

    button.htmx-request {
      background: #9ca3af;
      cursor: wait;
    }

    .btn-secondary {
      background: #e0e7ff;
      color: #667eea;
    }

    .btn-secondary:hover {
      background: #c7d2fe;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e5e7eb;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
    }

    .recipients-list {
      list-style: none;
    }

    .recipient-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #f9fafb;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .recipient-info {
      flex: 1;
    }

    .recipient-name {
      font-weight: 500;
      color: #333;
      margin-bottom: 2px;
    }

    .recipient-address {
      font-size: 12px;
      color: #666;
      font-family: 'Courier New', monospace;
    }

    .btn-select {
      background: #667eea;
      color: white;
      padding: 6px 12px;
      font-size: 12px;
    }

    .add-recipient-form {
      display: none;
      margin-top: 16px;
      padding: 16px;
      background: #f9fafb;
      border-radius: 6px;
    }

    .add-recipient-form.active {
      display: block;
    }

    .button-group {
      display: flex;
      gap: 8px;
    }

    .message {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .message.success {
      background: #d1fae5;
      color: #065f46;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Wallet Info Card -->
    <div class="card">
      <h1>{{.Username}}'s Wallet</h1>
      <div class="balance-section">
        <div>
          <div class="balance-label">Current Balance</div>
          <div id="balance-display">
            {{template "balance.html" .}}
          </div>
        </div>
        <button hx-post="/update-balance" hx-target="#balance-display" hx-swap="innerHTML">
          🔄 Reload Balance
        </button>
      </div>
    </div>

    <!-- Message Display -->
    <div id="message-box"></div>

    <!-- Send Money Card -->
    <div class="card">
      <h2>Send Money</h2>
      <form hx-post="/send" hx-target="#message-box" hx-on::after-request="if(event.detail.successful) this.reset()">
        <div class="form-group">
          <label for="recipientSelect">Select Recipient (Optional)</label>
          <select id="recipientSelect" name="recipient" onchange="fillAddress(this)">
            <option value="">-- Or enter address manually --</option>
            {{range .Contacts}}
            <option value="{{.Address}}">{{.Name}}</option>
            {{end}}
          </select>
        </div>

        <div class="form-group">
          <label for="recipientAddress">Recipient Address</label>
          <input type="text" id="recipientAddress" name="address" placeholder="Enter public address" required>
        </div>

        <div class="form-group">
          <label for="amount">Amount</label>
          <input type="number" id="amount" name="amount" placeholder="Enter amount to send" min="1" required>
        </div>

        <button type="submit">💸 Send</button>
      </form>
    </div>

    <!-- Recipients Card -->
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h2 style="margin: 0;">Known Recipients</h2>
        <button class="btn-secondary" onclick="toggleAddRecipient()">+ Add Recipient</button>
      </div>

      <!-- Add Recipient Form -->
      <div id="addRecipientForm" class="add-recipient-form">
        <form hx-post="/add-recipient" hx-target="#recipients-list"
          hx-on::after-request="if(event.detail.successful) { this.reset(); toggleAddRecipient(); }">
          <div class="form-group">
            <label for="newRecipientName">Name</label>
            <input type="text" id="newRecipientName" name="name" placeholder="Enter recipient name" required>
          </div>

          <div class="form-group">
            <label for="newRecipientAddress">Address</label>
            <input type="text" id="newRecipientAddress" name="address" placeholder="Enter public address" required>
          </div>

          <div class="button-group">
            <button type="submit">Save</button>
            <button type="button" class="btn-secondary" onclick="toggleAddRecipient()">Cancel</button>
          </div>
        </form>
      </div>

      <!-- Recipients List -->
      <div id="recipients-list">
        {{template "contacts.html" .}}
      </div>
    </div>
  </div>

  <script>
    function toggleAddRecipient() {
      const form = document.getElementById('addRecipientForm');
      form.classList.toggle('active');
    }

    function fillAddress(select) {
      document.getElementById('recipientAddress').value = select.value;
    }

    function selectRecipient(address) {
      document.getElementById('recipientAddress').value = address;
      document.getElementById('recipientSelect').value = address;
      document.getElementById('recipientAddress').scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>

</html>
